name: Bug report
description: Report a Comment Doc Lens bug that is not only a missing hint.
title: "fix: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the bug.
      render: text
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: If language-service state is involved, paste `Comment Doc Lens: Copy Diagnostics for Issue`.
      render: markdown
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Comment Doc Lens version
      placeholder: 0.5.0
    validations:
      required: true
  - type: input
    id: vscode-version
    attributes:
      label: VS Code version
      placeholder: 1.101.0
    validations:
      required: true
