name: publish

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to publish, for example comment-doc-lens-v0.4.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    if: ${{ startsWith(github.event.release.tag_name || inputs.release_tag, 'comment-doc-lens-v') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag }}
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Read version from release tag
        id: pkg
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: |
          VERSION="${RELEASE_TAG#comment-doc-lens-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify package version matches release tag
        shell: bash
        env:
          RELEASE_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]; then
            echo "package.json version ${PACKAGE_VERSION} does not match release tag version ${RELEASE_VERSION}." >&2
            exit 1
          fi

      - name: Package VSIX
        run: npx @vscode/vsce package -o comment-doc-lens-${{ steps.pkg.outputs.version }}.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix-artifact
          path: comment-doc-lens-${{ steps.pkg.outputs.version }}.vsix
          if-no-files-found: error

  github_release:
    needs: package
    if: ${{ startsWith(github.event.release.tag_name || inputs.release_tag, 'comment-doc-lens-v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-artifact
          path: .

      - name: Upload VSIX to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: comment-doc-lens-${{ needs.package.outputs.version }}.vsix
          tag_name: ${{ github.event.release.tag_name || inputs.release_tag }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  vsce_publish:
    needs: [package, github_release]
    if: ${{ startsWith(github.event.release.tag_name || inputs.release_tag, 'comment-doc-lens-v') }}
    runs-on: ubuntu-latest
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT || secrets.VSCE_TOKEN }}
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-artifact
          path: .

      - name: Ensure VSCE token present
        run: |
          if [ -z "${VSCE_PAT}" ]; then
            echo "VSCE_PAT/VSCE_TOKEN is not configured as a repository secret." >&2
            exit 1
          fi

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --skip-duplicate --packagePath comment-doc-lens-${{ needs.package.outputs.version }}.vsix

  openvsx_publish:
    needs: [package, github_release]
    if: ${{ startsWith(github.event.release.tag_name || inputs.release_tag, 'comment-doc-lens-v') }}
    runs-on: ubuntu-latest
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT || secrets.OPENVSX_TOKEN }}
    steps:
      - name: Download VSIX artifact
        uses: actions/download-artifact@v4
        with:
          name: vsix-artifact
          path: .

      - name: Ensure Open VSX token present
        run: |
          if [ -z "${OVSX_PAT}" ]; then
            echo "OVSX_PAT/OPENVSX_TOKEN is not configured as a repository secret." >&2
            exit 1
          fi

      - name: Publish to Open VSX
        run: npx ovsx publish --skip-duplicate --packagePath comment-doc-lens-${{ needs.package.outputs.version }}.vsix
