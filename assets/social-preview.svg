<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Comment Doc Lens social preview</title>
  <desc id="desc">GitHub social preview for the Comment Doc Lens VS Code extension.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070d13"/>
      <stop offset="0.48" stop-color="#0a1119"/>
      <stop offset="1" stop-color="#04080d"/>
    </linearGradient>
    <radialGradient id="leftGlow" cx="0.1" cy="0.28" r="0.72">
      <stop offset="0" stop-color="#0e2940" stop-opacity="0.45"/>
      <stop offset="0.42" stop-color="#0c1823" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#05090e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="editor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1520"/>
      <stop offset="1" stop-color="#080d13"/>
    </linearGradient>
    <linearGradient id="titleFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#d7dde6"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
    <filter id="textShadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <clipPath id="editorClip">
      <rect x="640" y="40" width="760" height="548" rx="18"/>
    </clipPath>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#leftGlow)"/>

  <g filter="url(#softShadow)">
    <image href="icon.png" x="50" y="90" width="136" height="136" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g filter="url(#textShadow)">
    <text x="50" y="305" fill="url(#titleFill)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="58" font-weight="800" letter-spacing="0">Comment Doc Lens</text>
  </g>
  <text x="50" y="365" fill="#d6dbe3" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="25" font-weight="500" letter-spacing="0">Inline symbol documentation for VS Code</text>
  <text x="50" y="407" fill="#d6dbe3" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="25" font-weight="500" letter-spacing="0">VS Code 引用处的内联符号文档提示</text>

  <g>
    <rect x="49" y="455" width="540" height="44" rx="10" fill="#07111a" stroke="#17324c" stroke-width="1.2"/>
    <text x="66" y="484" fill="#48a4ff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="0">Go · TypeScript · JavaScript · Python · Java · Rust · PHP · C++</text>
  </g>

  <g filter="url(#softShadow)" transform="translate(50 0)">
    <rect x="590" y="40" width="760" height="548" rx="18" fill="url(#editor)" stroke="#2a3644" stroke-width="1.5"/>
    <rect x="590" y="40" width="64" height="548" fill="#091018" stroke="#26313f" stroke-width="1"/>
    <rect x="654" y="40" width="150" height="54" fill="#101923" stroke="#2a3644" stroke-width="1"/>
    <rect x="804" y="40" width="546" height="54" fill="#080e15" stroke="#1f2a36" stroke-width="1"/>

    <text x="616" y="82" fill="#0f9af7" font-family="Arial, sans-serif" font-size="38" font-weight="800">⌁</text>
    <rect x="672" y="58" width="23" height="23" rx="2" fill="#0874d1"/>
    <text x="676" y="75" fill="#d7efff" font-family="Arial, sans-serif" font-size="11" font-weight="700">TS</text>
    <text x="704" y="75" fill="#e7ebf0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif" font-size="18" font-weight="500">order.ts</text>
    <text x="776" y="77" fill="#8f98a5" font-family="Arial, sans-serif" font-size="28">×</text>

    <g fill="none" stroke="#7c8795" stroke-width="2.2" opacity="0.62">
      <rect x="615" y="122" width="20" height="25" rx="2"/>
      <path d="M622 116h20v25"/>
      <circle cx="626" cy="192" r="14"/>
      <path d="M616 204l-11 13"/>
      <circle cx="617" cy="247" r="5"/>
      <circle cx="640" cy="247" r="5"/>
      <path d="M617 252v24m0-12h23m0-17v29"/>
      <path d="M611 309l28 16-28 16z"/>
      <rect x="612" y="365" width="18" height="18" rx="2"/>
      <rect x="635" y="358" width="18" height="18" rx="2"/>
      <rect x="635" y="383" width="18" height="18" rx="2"/>
      <circle cx="624" cy="491" r="14"/>
      <circle cx="624" cy="485" r="5"/>
      <path d="M611 506c4-10 22-10 26 0"/>
      <path d="M624 536v28m-14-14h28"/>
      <circle cx="624" cy="550" r="18"/>
    </g>

    <g font-family="'SF Mono', Menlo, Monaco, Consolas, monospace" font-size="18" letter-spacing="0">
      <g fill="#8b949e" text-anchor="end">
        <text x="705" y="125">1</text>
        <text x="705" y="153">2</text>
        <text x="705" y="181">3</text>
        <text x="705" y="209">4</text>
        <text x="705" y="237">5</text>
        <text x="705" y="265">6</text>
        <text x="705" y="293">7</text>
        <text x="705" y="321">8</text>
        <text x="705" y="349">9</text>
        <text x="705" y="377">10</text>
        <text x="705" y="405">11</text>
        <text x="705" y="433">12</text>
        <text x="705" y="461">13</text>
        <text x="705" y="489">14</text>
        <text x="705" y="517">15</text>
        <text x="705" y="545">16</text>
      </g>
      <g>
        <text x="716" y="125"><tspan fill="#c678dd">export</tspan><tspan fill="#79c0ff"> interface</tspan><tspan fill="#56d4f4"> OrderItem</tspan><tspan fill="#e7ebf0"> {</tspan></text>
        <text x="744" y="153"><tspan fill="#e7ebf0">id:</tspan><tspan fill="#40d6aa"> string</tspan><tspan fill="#e7ebf0">;</tspan></text>
        <text x="744" y="181"><tspan fill="#e7ebf0">price:</tspan><tspan fill="#40d6aa"> number</tspan><tspan fill="#e7ebf0">;</tspan></text>
        <text x="744" y="209"><tspan fill="#e7ebf0">quantity:</tspan><tspan fill="#40d6aa"> number</tspan><tspan fill="#e7ebf0">;</tspan></text>
        <text x="716" y="237" fill="#e7ebf0">}</text>
        <text x="716" y="293"><tspan fill="#c678dd">export</tspan><tspan fill="#79c0ff"> function</tspan><tspan fill="#f1d36b"> calculateTotal</tspan><tspan fill="#e7ebf0">(</tspan></text>
        <text x="744" y="321"><tspan fill="#e7ebf0">items:</tspan><tspan fill="#40d6aa"> OrderItem[]</tspan><tspan fill="#e7ebf0">,</tspan></text>
        <text x="744" y="349"><tspan fill="#e7ebf0">taxRate:</tspan><tspan fill="#40d6aa"> number</tspan><tspan fill="#79c0ff"> =</tspan><tspan fill="#f0bd64"> 0.1</tspan></text>
        <text x="716" y="377"><tspan fill="#e7ebf0">):</tspan><tspan fill="#40d6aa"> number</tspan><tspan fill="#e7ebf0"> {</tspan></text>
        <text x="744" y="405"><tspan fill="#79c0ff">const</tspan><tspan fill="#56d4f4"> subtotal</tspan><tspan fill="#79c0ff"> =</tspan><tspan fill="#e7ebf0"> items.</tspan><tspan fill="#f1d36b">reduce</tspan><tspan fill="#e7ebf0">((sum, item) =&gt; {</tspan></text>
        <text x="772" y="433"><tspan fill="#c678dd">return</tspan><tspan fill="#e7ebf0"> sum + item.price * item.quantity;</tspan></text>
        <text x="744" y="461" fill="#e7ebf0">}, 0);</text>
        <text x="744" y="489"><tspan fill="#79c0ff">const</tspan><tspan fill="#56d4f4"> tax</tspan><tspan fill="#79c0ff"> =</tspan><tspan fill="#56d4f4"> subtotal</tspan><tspan fill="#e7ebf0"> * taxRate;</tspan></text>
        <rect x="944" y="497" width="365" height="37" rx="6" fill="#19232f" opacity="0.86"/>
        <text x="744" y="517"><tspan fill="#c678dd">return</tspan><tspan fill="#e7ebf0"> subtotal + tax;</tspan><tspan fill="#8e98a5" font-style="italic"> // Calculates the final payable total...</tspan></text>
        <text x="716" y="545" fill="#e7ebf0">}</text>
      </g>
    </g>
  </g>
</svg>
